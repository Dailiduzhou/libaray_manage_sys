services:
  # 1. Nginx 反向代理 (新增)
  nginx:
    image: nginx:alpine
    container_name: library_nginx
    restart: always
    ports:
      - "80:80"   # HTTP
      - "443:443" # HTTPS
    volumes:
      # 挂载配置文件
      - ./nginx/conf.d:/etc/nginx/conf.d
      # 挂载证书
      - ./nginx/ssl:/etc/nginx/ssl
      # 挂载上传文件夹 (为了让 Nginx 直接服务静态图片，性能更高)
      - ./backend/uploads:/usr/share/nginx/html/uploads
    depends_on:
      - app
    networks:
      - app_net

  # 2. 你的 Go 应用程序
  app:
    build: ./backend
    container_name: library_app
    restart: always
    # ports:
    depends_on:
      - db
      - redis
    volumes:
      - ./backend/uploads:/root/uploads
    environment:
      - DB_HOST=db
      - DB_PORT=3306 
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    env_file:
      - .env
    networks:
      - app_net

  # 3. MySQL 数据库
  db:
    image: mysql:8.0
    container_name: library_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: books
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - app_net

  # 4. Redis 缓存
  redis:
    image: redis:alpine
    container_name: library_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app_net

  # 5. Prometheus 时序数据库
  prometheus:
    image: prom/prometheus:latest
    container_name: library_prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/rules:/etc/prometheus/rules
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - app_net

  # 6. Grafana 可视化面板
  grafana:
    image: grafana/grafana:latest
    container_name: library_grafana
    restart: always
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - app_net

# 定义网络 (让所有容器互通)
networks:
  app_net:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  prometheus_data:
  grafana_data:
